<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main content card -->
  <rect x="100" y="115" width="1000" height="400" rx="24" fill="rgba(255,255,255,0.1)" filter="url(#shadow)"/>
  
  <!-- Icon circle -->
  <circle cx="600" cy="220" r="60" fill="rgba(255,255,255,0.2)"/>
  <text x="600" y="235" font-size="60" text-anchor="middle" fill="#ffffff">📱</text>
  
  <!-- Title -->
  <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" text-anchor="middle" fill="#ffffff">QR Code Generator</text>
  
  <!-- Description -->
  <text x="600" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.9)">Create QR codes instantly</text>
  
  <!-- Brand -->
  <text x="600" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="rgba(255,255,255,0.7)">openkit.tools</text>
  <text x="600" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.5)">Free Online Developer Tools</text>
</svg>